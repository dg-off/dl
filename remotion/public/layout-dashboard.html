<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deadlock Layout Dashboard</title>
    <style>
      :root {
        --bg: #0b0e16;
        --panel: #111728;
        --panel-alt: #171f33;
        --line: rgba(255, 255, 255, 0.14);
        --text: #f4f7ff;
        --muted: rgba(244, 247, 255, 0.72);
        --accent: #ff4da6;
        --accent-strong: #ff2e98;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: radial-gradient(1100px 520px at 10% -10%, #1f2b46 0%, var(--bg) 55%);
        color: var(--text);
        font-family: "Segoe UI", Tahoma, sans-serif;
      }

      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 20px;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .title {
        margin: 0;
        font-size: 22px;
        letter-spacing: 0.02em;
      }

      .subtitle {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      button,
      a.button {
        appearance: none;
        border: 1px solid var(--line);
        background: var(--panel-alt);
        color: var(--text);
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 12px;
        text-decoration: none;
        cursor: pointer;
      }

      button.primary {
        border-color: rgba(255, 77, 166, 0.7);
        background: linear-gradient(180deg, var(--accent) 0%, var(--accent-strong) 100%);
        color: #220016;
        font-weight: 700;
      }

      .status {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 12px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
        gap: 12px;
      }

      .card {
        background: rgba(17, 23, 40, 0.92);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
      }

      details {
        border: 1px solid var(--line);
        border-radius: 8px;
        margin-top: 8px;
        background: rgba(255, 255, 255, 0.02);
      }

      summary {
        cursor: pointer;
        list-style: none;
        padding: 8px 10px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .group {
        padding: 0 10px 10px;
      }

      .field-toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-top: 8px;
        font-size: 12px;
      }

      .field-slider {
        margin-top: 8px;
        display: grid;
        grid-template-columns: 72px 1fr 86px;
        align-items: center;
        gap: 8px;
        font-size: 12px;
      }

      .label {
        color: var(--muted);
      }

      input[type="number"] {
        width: 100%;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        padding: 5px 6px;
      }

      input[type="range"] {
        width: 100%;
      }

      @media (max-width: 700px) {
        .field-slider {
          grid-template-columns: 1fr;
          gap: 4px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div>
          <h1 class="title">Layout Dashboard</h1>
          <p class="subtitle">Controls are external to Remotion preview. Changes sync live.</p>
        </div>
        <div class="actions">
          <button id="copy-json" class="primary">Copy JSON</button>
          <button id="reset-layout">Reset Defaults</button>
          <a class="button" href="/" target="_blank" rel="noreferrer">Open Studio</a>
        </div>
      </div>

      <div id="status" class="status">Initializing…</div>
      <div id="layout-root" class="grid"></div>
    </div>

    <script>
      (() => {
        const STORAGE_KEY = "deadlock.layout.v1";
        const CHANNEL_NAME = "deadlock-layout-channel";
        const SOURCE_DASHBOARD = "dashboard";
        const SOURCE_STUDIO = "studio";

        const REGION_ORDER = [
          "BG_IMAGE",
          "CHAR_BG",
          "BG_GRADIENT",
          "BG_VIGNETTE",
          "PROGRESS_BAR",
          "POSTER_ROW",
          "AUDIO_VISUALIZER",
          "SUBTITLE_BOX",
          "WATERMARK_ROW",
        ];

        const REGION_LAYER_MAP = {
          BG_IMAGE: 3,
          CHAR_BG: 2,
          BG_GRADIENT: 3,
          BG_VIGNETTE: 3,
          PROGRESS_BAR: 1,
          POSTER_ROW: 2,
          AUDIO_VISUALIZER: 2,
          SUBTITLE_BOX: 1,
          WATERMARK_ROW: 1,
        };

        const BOX_LIMITS = {
          x: { min: -300, max: 1080, step: 1 },
          y: { min: -400, max: 1920, step: 1 },
          width: { min: 0, max: 1400, step: 1 },
          height: { min: 0, max: 2200, step: 1 },
        };

        const DEFAULT_LAYOUT = {
          regions: {
            BG_IMAGE: { name: "BG_IMAGE", layer: 3, box: { x: 0, y: 0, width: 1080, height: 1920 }, visible: true, opacity: 1 },
            CHAR_BG: { name: "CHAR_BG", layer: 2, box: { x: 0, y: 0, width: 1080, height: 1920 }, visible: true, opacity: 0.35 },
            BG_GRADIENT: { name: "BG_GRADIENT", layer: 3, box: { x: 0, y: 0, width: 1080, height: 1920 }, visible: true, opacity: 1 },
            BG_VIGNETTE: { name: "BG_VIGNETTE", layer: 3, box: { x: 0, y: 0, width: 1080, height: 1920 }, visible: true, opacity: 1 },
            PROGRESS_BAR: { name: "PROGRESS_BAR", layer: 1, box: { x: 72, y: 80, width: 936, height: 12 }, visible: true, opacity: 1 },
            POSTER_ROW: { name: "POSTER_ROW", layer: 2, box: { x: 0, y: 260, width: 1080, height: 1160 }, visible: true, opacity: 1 },
            AUDIO_VISUALIZER: { name: "AUDIO_VISUALIZER", layer: 2, box: { x: 0, y: 1230, width: 1080, height: 130 }, visible: true, opacity: 1 },
            SUBTITLE_BOX: { name: "SUBTITLE_BOX", layer: 1, box: { x: 0, y: 1310, width: 1080, height: 530 }, visible: true, opacity: 1 },
            WATERMARK_ROW: { name: "WATERMARK_ROW", layer: 1, box: { x: 0, y: 1820, width: 1080, height: 64 }, visible: true, opacity: 1 },
          },
          ui: {
            showGuides: false,
            showLabels: true,
            showLayer3: true,
            showLayer2: true,
            showLayer1: true,
          },
          topo: {
            enabled: true,
            showContours: true,
            opacityBack: 0.16,
            opacityMid: 0.24,
            opacityFront: 0.34,
            contourSpacing: 18,
            contourStrokeOpacity: 0.28,
          },
        };

        const state = {
          layout: null,
          channel: null,
        };

        const statusEl = document.getElementById("status");
        const rootEl = document.getElementById("layout-root");

        const setStatus = (text) => {
          const stamp = new Date().toLocaleTimeString();
          statusEl.textContent = `${text} (${stamp})`;
        };

        const deepClone = (value) => JSON.parse(JSON.stringify(value));
        const clamp = (value, min, max) => Math.min(max, Math.max(min, value));

        const normalizeLayout = (input) => {
          const fallback = deepClone(DEFAULT_LAYOUT);
          if (!input || typeof input !== "object") return fallback;

          const out = deepClone(fallback);
          const srcRegions = input.regions && typeof input.regions === "object" ? input.regions : {};

          REGION_ORDER.forEach((name) => {
            const src = srcRegions[name] || {};
            out.regions[name] = {
              name,
              layer: Number.isFinite(src.layer) ? src.layer : REGION_LAYER_MAP[name],
              visible: typeof src.visible === "boolean" ? src.visible : true,
              opacity: Number.isFinite(src.opacity) ? clamp(src.opacity, 0, 1) : fallback.regions[name].opacity,
              box: {
                x: Number.isFinite(src.box?.x) ? src.box.x : fallback.regions[name].box.x,
                y: Number.isFinite(src.box?.y) ? src.box.y : fallback.regions[name].box.y,
                width: Number.isFinite(src.box?.width) ? src.box.width : fallback.regions[name].box.width,
                height: Number.isFinite(src.box?.height) ? src.box.height : fallback.regions[name].box.height,
              },
            };
          });

          const srcUi = input.ui && typeof input.ui === "object" ? input.ui : {};
          out.ui = {
            showGuides: typeof srcUi.showGuides === "boolean" ? srcUi.showGuides : fallback.ui.showGuides,
            showLabels: typeof srcUi.showLabels === "boolean" ? srcUi.showLabels : fallback.ui.showLabels,
            showLayer3: typeof srcUi.showLayer3 === "boolean" ? srcUi.showLayer3 : fallback.ui.showLayer3,
            showLayer2: typeof srcUi.showLayer2 === "boolean" ? srcUi.showLayer2 : fallback.ui.showLayer2,
            showLayer1: typeof srcUi.showLayer1 === "boolean" ? srcUi.showLayer1 : fallback.ui.showLayer1,
          };

          const srcTopo = input.topo && typeof input.topo === "object" ? input.topo : {};
          out.topo = {
            enabled: typeof srcTopo.enabled === "boolean" ? srcTopo.enabled : fallback.topo.enabled,
            showContours: typeof srcTopo.showContours === "boolean" ? srcTopo.showContours : fallback.topo.showContours,
            opacityBack: Number.isFinite(srcTopo.opacityBack) ? clamp(srcTopo.opacityBack, 0, 1) : fallback.topo.opacityBack,
            opacityMid: Number.isFinite(srcTopo.opacityMid) ? clamp(srcTopo.opacityMid, 0, 1) : fallback.topo.opacityMid,
            opacityFront: Number.isFinite(srcTopo.opacityFront) ? clamp(srcTopo.opacityFront, 0, 1) : fallback.topo.opacityFront,
            contourSpacing: Number.isFinite(srcTopo.contourSpacing) ? clamp(srcTopo.contourSpacing, 6, 80) : fallback.topo.contourSpacing,
            contourStrokeOpacity: Number.isFinite(srcTopo.contourStrokeOpacity)
              ? clamp(srcTopo.contourStrokeOpacity, 0, 1)
              : fallback.topo.contourStrokeOpacity,
          };

          return out;
        };

        const loadFromStorage = () => {
          try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return deepClone(DEFAULT_LAYOUT);
            return normalizeLayout(JSON.parse(raw));
          } catch {
            return deepClone(DEFAULT_LAYOUT);
          }
        };

        const persist = () => {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state.layout));
        };

        const message = (type, extra = {}) => ({
          type,
          source: SOURCE_DASHBOARD,
          ts: Date.now(),
          ...extra,
        });

        const post = (payload) => {
          if (!state.channel) return;
          state.channel.postMessage(payload);
        };

        const isSyncMessage = (value) => {
          if (!value || typeof value !== "object") return false;
          if (typeof value.type !== "string") return false;
          if (typeof value.source !== "string") return false;
          if (typeof value.ts !== "number") return false;
          return true;
        };

        const commit = (nextLayout, options = {}) => {
          const { broadcast = true, writeStorage = true, rerender = true, status = "Updated" } = options;
          state.layout = normalizeLayout(nextLayout);
          if (writeStorage) persist();
          if (broadcast) post(message("layout:update", { layout: state.layout }));
          if (rerender) render();
          setStatus(status);
        };

        const updateAtPath = (path, value) => {
          const next = deepClone(state.layout);
          let cursor = next;
          for (let i = 0; i < path.length - 1; i++) {
            cursor = cursor[path[i]];
          }
          cursor[path[path.length - 1]] = value;
          commit(next, { rerender: false });
        };

        const makeToggle = (label, checked, onChange) => {
          const row = document.createElement("label");
          row.className = "field-toggle";
          const left = document.createElement("span");
          left.className = "label";
          left.textContent = label;
          const input = document.createElement("input");
          input.type = "checkbox";
          input.checked = checked;
          input.addEventListener("change", () => onChange(input.checked));
          row.append(left, input);
          return row;
        };

        const makeSlider = (label, value, limits, onChange) => {
          const row = document.createElement("div");
          row.className = "field-slider";

          const left = document.createElement("span");
          left.className = "label";
          left.textContent = label;

          const range = document.createElement("input");
          range.type = "range";
          range.min = String(limits.min);
          range.max = String(limits.max);
          range.step = String(limits.step);
          range.value = String(value);

          const number = document.createElement("input");
          number.type = "number";
          number.min = String(limits.min);
          number.max = String(limits.max);
          number.step = String(limits.step);
          number.value = String(value);

          const sync = (raw) => {
            const parsed = Number(raw);
            if (!Number.isFinite(parsed)) return;
            const clamped = clamp(parsed, limits.min, limits.max);
            range.value = String(clamped);
            number.value = String(clamped);
            onChange(clamped);
          };

          range.addEventListener("input", () => sync(range.value));
          number.addEventListener("change", () => sync(number.value));

          row.append(left, range, number);
          return row;
        };

        const makeSection = (title) => {
          const details = document.createElement("details");
          details.open = true;
          const summary = document.createElement("summary");
          summary.textContent = title;
          const group = document.createElement("div");
          group.className = "group";
          details.append(summary, group);
          return { details, group };
        };

        const render = () => {
          rootEl.innerHTML = "";

          const leftCard = document.createElement("div");
          leftCard.className = "card";
          const rightCard = document.createElement("div");
          rightCard.className = "card";

          const globalSection = makeSection("Global");
          globalSection.group.append(
            makeToggle("Show guides", state.layout.ui.showGuides, (v) => updateAtPath(["ui", "showGuides"], v)),
            makeToggle("Show labels", state.layout.ui.showLabels, (v) => updateAtPath(["ui", "showLabels"], v)),
            makeToggle("Show layer 3", state.layout.ui.showLayer3, (v) => updateAtPath(["ui", "showLayer3"], v)),
            makeToggle("Show layer 2", state.layout.ui.showLayer2, (v) => updateAtPath(["ui", "showLayer2"], v)),
            makeToggle("Show layer 1", state.layout.ui.showLayer1, (v) => updateAtPath(["ui", "showLayer1"], v))
          );

          const topoSection = makeSection("Topographical");
          topoSection.group.append(
            makeToggle("Enable planes", state.layout.topo.enabled, (v) => updateAtPath(["topo", "enabled"], v)),
            makeToggle("Contour lines", state.layout.topo.showContours, (v) => updateAtPath(["topo", "showContours"], v)),
            makeSlider("Back Op", state.layout.topo.opacityBack, { min: 0, max: 1, step: 0.01 }, (v) =>
              updateAtPath(["topo", "opacityBack"], v)
            ),
            makeSlider("Mid Op", state.layout.topo.opacityMid, { min: 0, max: 1, step: 0.01 }, (v) =>
              updateAtPath(["topo", "opacityMid"], v)
            ),
            makeSlider("Front Op", state.layout.topo.opacityFront, { min: 0, max: 1, step: 0.01 }, (v) =>
              updateAtPath(["topo", "opacityFront"], v)
            ),
            makeSlider("Spacing", state.layout.topo.contourSpacing, { min: 6, max: 80, step: 1 }, (v) =>
              updateAtPath(["topo", "contourSpacing"], v)
            ),
            makeSlider("Line Op", state.layout.topo.contourStrokeOpacity, { min: 0, max: 1, step: 0.01 }, (v) =>
              updateAtPath(["topo", "contourStrokeOpacity"], v)
            )
          );

          leftCard.append(globalSection.details, topoSection.details);

          const regionTitle = document.createElement("div");
          regionTitle.style.fontSize = "12px";
          regionTitle.style.fontWeight = "700";
          regionTitle.style.letterSpacing = "0.04em";
          regionTitle.textContent = "Regions";
          rightCard.append(regionTitle);

          REGION_ORDER.forEach((name) => {
            const region = state.layout.regions[name];
            const section = makeSection(`${name} | L${region.layer}`);
            section.group.append(
              makeToggle("Visible", region.visible, (v) => updateAtPath(["regions", name, "visible"], v)),
              makeSlider("Opacity", region.opacity ?? 1, { min: 0, max: 1, step: 0.01 }, (v) => updateAtPath(["regions", name, "opacity"], v)),
              makeSlider("X", region.box.x, BOX_LIMITS.x, (v) => updateAtPath(["regions", name, "box", "x"], v)),
              makeSlider("Y", region.box.y, BOX_LIMITS.y, (v) => updateAtPath(["regions", name, "box", "y"], v)),
              makeSlider("Width", region.box.width, BOX_LIMITS.width, (v) => updateAtPath(["regions", name, "box", "width"], v)),
              makeSlider("Height", region.box.height, BOX_LIMITS.height, (v) => updateAtPath(["regions", name, "box", "height"], v))
            );
            rightCard.append(section.details);
          });

          rootEl.append(leftCard, rightCard);
        };

        const initChannel = () => {
          if (typeof BroadcastChannel === "undefined") {
            setStatus("BroadcastChannel unavailable - storage sync only");
            return;
          }
          state.channel = new BroadcastChannel(CHANNEL_NAME);
          state.channel.onmessage = (event) => {
            const data = event.data;
            if (!isSyncMessage(data)) return;
            if (data.source === SOURCE_DASHBOARD) return;

            if (data.type === "layout:request-current") {
              post(message("layout:current", { layout: state.layout }));
              return;
            }

            if (data.type === "layout:update" || data.type === "layout:current") {
              if (!data.layout) return;
              commit(data.layout, { broadcast: false, writeStorage: true, status: "Synced from Studio" });
            }
          };
          post(message("layout:request-current"));
          setStatus("Live sync ready");
        };

        window.addEventListener("storage", (event) => {
          if (event.key !== STORAGE_KEY) return;
          commit(parseStored(event.newValue), {
            broadcast: false,
            writeStorage: false,
            status: "Synced from storage",
          });
        });

        const parseStored = (raw) => {
          if (!raw) return deepClone(DEFAULT_LAYOUT);
          try {
            return normalizeLayout(JSON.parse(raw));
          } catch {
            return deepClone(DEFAULT_LAYOUT);
          }
        };

        document.getElementById("copy-json").addEventListener("click", async () => {
          try {
            await navigator.clipboard.writeText(JSON.stringify(state.layout, null, 2));
            setStatus("JSON copied");
          } catch {
            setStatus("Copy failed");
          }
        });

        document.getElementById("reset-layout").addEventListener("click", () => {
          commit(deepClone(DEFAULT_LAYOUT), { status: "Reset to defaults" });
        });

        state.layout = loadFromStorage();
        render();
        initChannel();
      })();
    </script>
  </body>
</html>
