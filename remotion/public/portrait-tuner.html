<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portrait Tuner — Deadlock</title>
    <style>
      :root {
        --bg: #0b0e16;
        --panel: #111728;
        --panel-alt: #171f33;
        --line: rgba(255, 255, 255, 0.14);
        --text: #f4f7ff;
        --muted: rgba(244, 247, 255, 0.72);
        --gold: #f7d274;
        --gold-dim: rgba(247, 210, 116, 0.55);
        --accent: #f7d274;
        --accent-strong: #e6bc50;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background: radial-gradient(1100px 520px at 10% -10%, #1f2b46 0%, var(--bg) 55%);
        color: var(--text);
        font-family: "Segoe UI", Tahoma, sans-serif;
      }

      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 24px 20px;
      }

      .header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 20px;
      }

      .title { margin: 0; font-size: 22px; letter-spacing: 0.02em; }
      .subtitle { margin: 4px 0 0; color: var(--muted); font-size: 13px; }

      .actions { display: flex; gap: 8px; flex-wrap: wrap; }

      button, a.button {
        appearance: none;
        border: 1px solid var(--line);
        background: var(--panel-alt);
        color: var(--text);
        border-radius: 6px;
        padding: 8px 12px;
        font-size: 12px;
        text-decoration: none;
        cursor: pointer;
      }

      button.primary {
        border-color: rgba(247, 210, 116, 0.7);
        background: linear-gradient(180deg, var(--accent) 0%, var(--accent-strong) 100%);
        color: #1a1200;
        font-weight: 700;
      }

      button.lock-btn {
        border-color: rgba(100, 200, 120, 0.5);
        background: rgba(60, 140, 80, 0.25);
        color: #90eeaa;
        font-weight: 600;
        width: 100%;
        padding: 10px;
        font-size: 14px;
        margin-top: 8px;
      }

      button.lock-btn:disabled {
        opacity: 0.4;
        cursor: default;
      }

      .card {
        background: rgba(17, 23, 40, 0.92);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 18px;
        margin-bottom: 16px;
      }

      .card-title {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--gold-dim);
        margin: 0 0 14px;
      }

      .slot-title {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        margin: 16px 0 4px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--line);
      }

      select {
        width: 100%;
        background: var(--panel-alt);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        padding: 9px 10px;
        font-size: 14px;
        cursor: pointer;
      }

      .slider-row {
        margin-top: 14px;
        display: grid;
        grid-template-columns: 110px 1fr 70px;
        align-items: center;
        gap: 10px;
        font-size: 13px;
      }

      .slider-label { color: var(--muted); }

      input[type="range"] { width: 100%; accent-color: var(--gold); cursor: pointer; }

      .val {
        background: rgba(0,0,0,0.3);
        border: 1px solid var(--line);
        border-radius: 5px;
        padding: 4px 6px;
        text-align: center;
        font-size: 13px;
        font-variant-numeric: tabular-nums;
      }

      .status-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 6px;
      }

      .char-chip {
        padding: 5px 8px;
        border-radius: 5px;
        font-size: 11px;
        letter-spacing: 0.04em;
        border: 1px solid var(--line);
        background: rgba(255,255,255,0.04);
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .char-chip.saved {
        border-color: rgba(100, 200, 120, 0.5);
        background: rgba(60, 140, 80, 0.15);
        color: #90eeaa;
      }

      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--line);
        flex-shrink: 0;
      }

      .dot.saved { background: #6fcf97; }

      #status-msg {
        font-size: 12px;
        color: var(--muted);
        min-height: 18px;
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div>
          <h1 class="title">Portrait Tuner</h1>
          <p class="subtitle">Adjust per-character crop &amp; zoom per slot. Changes preview live in Studio.</p>
        </div>
        <div class="actions">
          <button id="export-btn" class="primary">Export JSON</button>
          <a class="button" href="/" target="_blank" rel="noreferrer">Open Studio</a>
        </div>
      </div>

      <div id="status-msg">Connecting…</div>

      <div class="card">
        <div class="card-title">Character</div>
        <select id="char-select">
          <option value="">— select a character —</option>
          <option value="abrams">abrams</option>
          <option value="apollo">apollo</option>
          <option value="bebop">bebop</option>
          <option value="billy">billy</option>
          <option value="calico">calico</option>
          <option value="celeste">celeste</option>
          <option value="drifter">drifter</option>
          <option value="dynamo">dynamo</option>
          <option value="graves">graves</option>
          <option value="grey_talon">grey_talon</option>
          <option value="haze">haze</option>
          <option value="holliday">holliday</option>
          <option value="infernus">infernus</option>
          <option value="ivy">ivy</option>
          <option value="kelvin">kelvin</option>
          <option value="lady_geist">lady_geist</option>
          <option value="lash">lash</option>
          <option value="mcginnis">mcginnis</option>
          <option value="mina">mina</option>
          <option value="mirage">mirage</option>
          <option value="mo_&amp;_krill">mo_&amp;_krill</option>
          <option value="paige">paige</option>
          <option value="paradox">paradox</option>
          <option value="pocket">pocket</option>
          <option value="rem">rem</option>
          <option value="seven">seven</option>
          <option value="shiv">shiv</option>
          <option value="silver">silver</option>
          <option value="sinclair">sinclair</option>
          <option value="the_doorman">the_doorman</option>
          <option value="venator">venator</option>
          <option value="victor">victor</option>
          <option value="vindicta">vindicta</option>
          <option value="viscous">viscous</option>
          <option value="vyper">vyper</option>
          <option value="warden">warden</option>
          <option value="wraith">wraith</option>
          <option value="yamato">yamato</option>
        </select>

        <div class="slot-title">Shared Transform (parent-relative)</div>
        <div id="transform-controls"></div>

        <div style="display:flex;gap:20px;margin-top:14px;font-size:13px;color:var(--muted)">
          <label style="display:flex;align-items:center;gap:7px;cursor:pointer">
            <input type="checkbox" id="chk-left-bg" checked /> Left BG
          </label>
          <label style="display:flex;align-items:center;gap:7px;cursor:pointer">
            <input type="checkbox" id="chk-left-card" checked /> Left Card
          </label>
          <label style="display:flex;align-items:center;gap:7px;cursor:pointer">
            <input type="checkbox" id="chk-right-bg" checked /> Right BG
          </label>
          <label style="display:flex;align-items:center;gap:7px;cursor:pointer">
            <input type="checkbox" id="chk-right-card" checked /> Right Card
          </label>
        </div>

        <button class="lock-btn" id="lock-btn" disabled>Lock In Character</button>
      </div>

      <div class="card">
        <div class="card-title">Saved Characters</div>
        <div class="status-grid" id="char-status"></div>
      </div>
    </div>

    <script>
      const CHANNEL_NAME = "deadlock-portrait-channel";
      const STORAGE_KEY = "deadlock.portraits.v2";
      const ALL_CHARS = [
        "abrams","apollo","bebop","billy","calico","celeste","drifter","dynamo",
        "graves","grey_talon","haze","holliday","infernus","ivy","kelvin","lady_geist",
        "lash","mcginnis","mina","mirage","mo_&_krill","paige","paradox","pocket",
        "rem","seven","shiv","silver","sinclair","the_doorman","venator","victor",
        "vindicta","viscous","vyper","warden","wraith","yamato"
      ];

      const CONTROL_SPECS = [
        { key: "xPct", label: "Portrait X", min: 0, max: 100, step: 0.5, format: "percent", defaultValue: 50 },
        { key: "yPct", label: "Portrait Y", min: 0, max: 100, step: 0.5, format: "percent", defaultValue: 0 },
        { key: "scale", label: "Scale", min: 1.0, max: 4.0, step: 0.05, format: "number", defaultValue: 1.92 },
        { key: "rotationDeg", label: "Rotation", min: -180, max: 180, step: 1, format: "degrees", defaultValue: 0 },
      ];

      const DEFAULT_TRANSFORM = { xPct: 50, yPct: 0, scale: 1.92, rotationDeg: 0 };
      const DEFAULT_SLOT = { objectPositionX: 50, objectPositionY: 0, scale: 1.92, rotation: 0 };
      const DEFAULT_CHAR_CONFIG = { left: { ...DEFAULT_SLOT }, right: { ...DEFAULT_SLOT } };

      let config = {};
      const saved = new Set();

      const controlInputId = (key) => `sl-${key}`;
      const controlValueId = (key) => `val-${key}`;

      function formatControlValue(spec, raw) {
        const value = Number(raw);
        if (!Number.isFinite(value)) return "";
        if (spec.format === "percent") return `${value.toFixed(1)}%`;
        if (spec.format === "degrees") return `${Math.round(value)}°`;
        return value.toFixed(2);
      }

      function controlToSlot(transform) {
        return {
          objectPositionX: transform.xPct,
          objectPositionY: transform.yPct,
          scale: transform.scale,
          rotation: transform.rotationDeg,
        };
      }

      function slotToControl(slot) {
        return {
          xPct: Number.isFinite(slot.objectPositionX) ? slot.objectPositionX : DEFAULT_TRANSFORM.xPct,
          yPct: Number.isFinite(slot.objectPositionY) ? slot.objectPositionY : DEFAULT_TRANSFORM.yPct,
          scale: Number.isFinite(slot.scale) ? slot.scale : DEFAULT_TRANSFORM.scale,
          rotationDeg: Number.isFinite(slot.rotation) ? slot.rotation : DEFAULT_TRANSFORM.rotationDeg,
        };
      }

      function renderTransformControls() {
        const root = document.getElementById("transform-controls");
        root.innerHTML = "";

        CONTROL_SPECS.forEach((spec) => {
          const row = document.createElement("div");
          row.className = "slider-row";

          const label = document.createElement("span");
          label.className = "slider-label";
          label.textContent = spec.label;

          const slider = document.createElement("input");
          slider.type = "range";
          slider.id = controlInputId(spec.key);
          slider.min = String(spec.min);
          slider.max = String(spec.max);
          slider.step = String(spec.step);
          slider.value = String(spec.defaultValue);

          const valueEl = document.createElement("span");
          valueEl.className = "val";
          valueEl.id = controlValueId(spec.key);
          valueEl.textContent = formatControlValue(spec, spec.defaultValue);

          row.append(label, slider, valueEl);
          root.appendChild(row);
        });
      }

      function DEFAULT_SETTINGS_MAP() {
        const m = {};
        for (const k of ALL_CHARS) m[k] = { left: { ...DEFAULT_SLOT }, right: { ...DEFAULT_SLOT } };
        return m;
      }

      function loadFromStorage() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) return JSON.parse(raw);
        } catch {}
        return {};
      }

      function saveToStorage() {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(config)); } catch {}
      }

      let channel = null;
      function broadcast(msg) {
        if (channel) channel.postMessage(msg);
      }

      function currentTransform() {
        const out = {};
        CONTROL_SPECS.forEach((spec) => {
          const el = document.getElementById(controlInputId(spec.key));
          out[spec.key] = parseFloat(el.value);
        });
        return out;
      }

      function currentCharConfig() {
        const transform = currentTransform();
        const shared = controlToSlot(transform);
        return { left: { ...shared }, right: { ...shared } };
      }

      function loadSettingsForChar(charKey) {
        const entry = config[charKey] ?? { ...DEFAULT_CHAR_CONFIG };
        const left = entry.left ?? { ...DEFAULT_SLOT };
        const transform = slotToControl(left);
        CONTROL_SPECS.forEach((spec) => {
          const el = document.getElementById(controlInputId(spec.key));
          el.value = String(transform[spec.key]);
        });
        updateValueDisplays();
      }

      function updateValueDisplays() {
        CONTROL_SPECS.forEach((spec) => {
          const slider = document.getElementById(controlInputId(spec.key));
          const value = document.getElementById(controlValueId(spec.key));
          value.textContent = formatControlValue(spec, slider.value);
        });
      }

      function setStatus(msg) {
        document.getElementById("status-msg").textContent = msg;
      }

      function renderStatusGrid() {
        const grid = document.getElementById("char-status");
        grid.innerHTML = "";
        for (const k of ALL_CHARS) {
          const isSaved = saved.has(k);
          const chip = document.createElement("div");
          chip.className = "char-chip" + (isSaved ? " saved" : "");
          chip.innerHTML = `<span class="dot${isSaved ? " saved" : ""}"></span>${k}`;
          grid.appendChild(chip);
        }
      }

      const charSelect = document.getElementById("char-select");
      charSelect.addEventListener("change", () => {
        const charKey = charSelect.value;
        const lockBtn = document.getElementById("lock-btn");
        if (!charKey) {
          lockBtn.disabled = true;
          broadcast({ type: "portrait:preview-character", charKey: null, ts: Date.now() });
          return;
        }
        lockBtn.disabled = false;
        loadSettingsForChar(charKey);
        broadcast({ type: "portrait:preview-character", charKey, ts: Date.now() });
        broadcastBgVisibility();
        broadcastPortraitVisibility();
        setStatus(`Previewing: ${charKey}`);
      });

      function broadcastCurrentPortraitUpdate() {
        updateValueDisplays();
        const charKey = charSelect.value;
        if (!charKey) return;
        const charConfig = currentCharConfig();
        config[charKey] = charConfig;
        broadcast({ type: "portrait:update", charKey, charConfig, ts: Date.now() });
      }

      function bindControlEvents() {
        CONTROL_SPECS.forEach((spec) => {
          const id = controlInputId(spec.key);
          document.getElementById(id).addEventListener("input", broadcastCurrentPortraitUpdate);
        });
      }

      function broadcastBgVisibility() {
        const leftVisible = document.getElementById("chk-left-bg").checked;
        const rightVisible = document.getElementById("chk-right-bg").checked;
        broadcast({ type: "portrait:preview-bg-visibility", leftVisible, rightVisible, ts: Date.now() });
      }

      ["chk-left-bg", "chk-right-bg"].forEach((id) => {
        document.getElementById(id).addEventListener("change", broadcastBgVisibility);
      });

      function broadcastPortraitVisibility() {
        const leftVisible = document.getElementById("chk-left-card").checked;
        const rightVisible = document.getElementById("chk-right-card").checked;
        broadcast({ type: "portrait:preview-portrait-visibility", leftVisible, rightVisible, ts: Date.now() });
      }

      ["chk-left-card", "chk-right-card"].forEach((id) => {
        document.getElementById(id).addEventListener("change", broadcastPortraitVisibility);
      });

      document.getElementById("lock-btn").addEventListener("click", () => {
        const charKey = charSelect.value;
        if (!charKey) return;
        const charConfig = currentCharConfig();
        config[charKey] = charConfig;
        saved.add(charKey);
        saveToStorage();
        broadcast({ type: "portrait:update", charKey, charConfig, ts: Date.now() });
        renderStatusGrid();
        const left = charConfig.left;
        setStatus(
          `Locked in: ${charKey} — X:${left.objectPositionX}% Y:${left.objectPositionY}% S:${left.scale} R:${left.rotation}°`
        );
        charSelect.value = "";
        document.getElementById("lock-btn").disabled = true;
        broadcast({ type: "portrait:preview-character", charKey: null, ts: Date.now() });
      });

      document.getElementById("export-btn").addEventListener("click", () => {
        const json = JSON.stringify(config, null, 2);
        navigator.clipboard.writeText(json).then(() => {
          setStatus("JSON copied to clipboard! Paste into data/portrait-config.json");
        }).catch(() => {
          const blob = new Blob([json], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          window.open(url);
          setStatus("Opened JSON in new tab.");
        });
      });

      if (typeof BroadcastChannel !== "undefined") {
        channel = new BroadcastChannel(CHANNEL_NAME);
        channel.onmessage = (event) => {
          const msg = event.data;
          if (!msg || typeof msg.type !== "string") return;
          if (msg.type === "portrait:current") {
            config = { ...DEFAULT_SETTINGS_MAP(), ...msg.config };
            renderStatusGrid();
            setStatus("Synced with Studio.");
          }
        };
      }

      (function init() {
        renderTransformControls();
        bindControlEvents();
        updateValueDisplays();

        const stored = loadFromStorage();
        config = { ...DEFAULT_SETTINGS_MAP(), ...stored };
        for (const k of ALL_CHARS) {
          if (stored[k]) saved.add(k);
        }
        renderStatusGrid();
        broadcast({ type: "portrait:request-current", ts: Date.now() });
        setStatus("Ready. Select a character to start.");
      })();
    </script>
  </body>
</html>
